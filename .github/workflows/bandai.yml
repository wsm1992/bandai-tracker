name: Premium Bandai Monitor

on:
  schedule:
    - cron: '0 10 * * *' # 每天澳門時間 18:00 執行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor_job:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 檢查並載入倉庫代碼
      uses: actions/checkout@v4

    - name: 2. 初始化 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝必要套件與雲端瀏覽器
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 playwright
        # 💡 安裝 Playwright 所需的 Chromium 瀏覽器核心與系統依賴檔案
        playwright install chromium
        playwright install-deps chromium

    - name: 4. 執行萬代監控腳本
      run: python bandai_tracker.py 

    - name: 5. 偵測並發送 Email 通知
      if: hashFiles('mail_alert.txt') != ''
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: 🚨 Premium Bandai 新商品上架通知！
        to: ${{ secrets.MAIL_TO }}
        from: GitHub Action Bot
        body: file://mail_alert.txt

    - name: 6. 比對並自動推回 JSON 資料庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        if [ -n "$(git status --porcelain pb_product_history.json)" ]; then
          echo "偵測到資料庫更新，正在儲存並推回 GitHub..."
          git add pb_product_history.json
          git commit -m "🤖 自動更新：Premium Bandai 商品歷史紀錄"
          git push
        else
          echo "資料庫與昨日相同，無需更新。"
        fi