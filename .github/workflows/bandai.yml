name: Premium Bandai Monitor

on:
  schedule:
    # ⚠️ 注意：GitHub Actions 的定時任務使用的是 UTC 時間。
    # 澳門時間為 UTC+8。如果想要在每天傍晚 18:00 執行，減去 8 小時就是 10:00 UTC。
    - cron: '0 10 * * *'
  workflow_dispatch: # 允許你隨時手動點擊按鈕，直接觸發測試

permissions:
  contents: write # 關鍵！這行允許機器人有權限將更新後的 JSON 檔案 push 回你的倉庫

jobs:
  monitor_job:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 檢查並載入倉庫代碼
      uses: actions/checkout@v4

    - name: 2. 初始化 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 4. 執行萬代監控腳本
      env:
        # 將你在 GitHub 設定的隱密權杖 (Secret) 帶入環境變數中
        NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
      run: python bandai_monitor.py

    - name: 5. 比對並自動推回 JSON 資料庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # 檢查 pb_product_history.json 是否有被修改過
        if [ -n "$(git status --porcelain pb_product_history.json)" ]; then
          echo "偵測到資料庫更新，正在儲存並推回 GitHub..."
          git add pb_product_history.json
          git commit -m "🤖 自動更新：Premium Bandai 商品歷史紀錄"
          git push
        else
          echo "資料庫與昨日相同，無需更新。"
        fi