name: HK Premium Bandai Monitor

on:
  schedule:
    - cron: '13 4 * * *' # 每天當地時間中午 12:13 自動執行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor_job:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: 安裝必要套件與雲端瀏覽器
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 playwright
        playwright install chromium
        playwright install-deps chromium
    - name: 執行香港萬代監控
      run: python bandai_tracker.py hk # 💡 傳入參數 hk
    - name: 📸 上傳除錯截圖 (僅在無商品時觸發)
      uses: actions/upload-artifact@v4
      with:
        name: pb-hk-debug-screenshot
        path: screenshot_hk.png
        if-no-files-found: ignore  # 如果順利抓到商品、沒產生截圖，就自動跳過不報錯
        retention-days: 7          # 檔案保留 7 天，過期自動刪除不佔空間
    - name: 偵測並發送 Email 通知
      if: hashFiles('mail_alert.txt') != ''
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: 🚨 【HK Premium Bandai】新商品上架通知！
        to: ${{ secrets.MAIL_TO }}
        from: GitHub Action Bot
        body: file://mail_alert.txt
    - name: 自動推回 JSON 資料庫
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 自動更新：HK Premium Bandai 商品紀錄"
        file_pattern: 'pb_hk_history.json'
